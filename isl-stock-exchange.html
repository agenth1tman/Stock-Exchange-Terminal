<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSX Terminal</title>
<link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=isl.school&sz=256">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap');

:root {
  --bg-dark: #080808;
  --gold: #f0c000;
  --gold-hover: #ffd700;
  --blue-dark: #1a3a8f;
  --text-main: #f5f0e8;
  --text-muted: #555566;
  --panel: rgba(14, 14, 14, 0.9);
  --border-subtle: rgba(240, 192, 0, 0.12);
  --profit: #4caf7d;
  --loss: #cc2233;
}

body {
  margin: 0;
  height: 100vh;
  background-color: var(--bg-dark);
  color: var(--text-main);
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
}

/* Background Grid Setup */
.grid-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image: 
    linear-gradient(to right, rgba(240, 192, 0, 0.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(240, 192, 0, 0.05) 1px, transparent 1px);
  background-size: 64px 64px;
  z-index: 0;
}

.grid-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 20%, var(--bg-dark) 80%);
}

/* Custom UI Elements */
.glass-panel {
  background: var(--panel);
  border: 1px solid var(--border-subtle);
  backdrop-filter: blur(8px);
}

.tx-input {
  width: 100%;
  background: rgba(14, 14, 14, 0.9);
  border: 1px solid var(--border-subtle);
  color: var(--text-main);
  font-size: 13px;
  padding: 12px 16px;
  outline: none;
  font-family: inherit;
  box-sizing: border-box;
  transition: all 0.2s;
}
.tx-input:focus {
  border-color: rgba(240, 192, 0, 0.5);
  box-shadow: 0 0 0 1px rgba(240, 192, 0, 0.15);
}

.tx-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

.btn-gold {
  width: 100%;
  background: var(--gold);
  color: black;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 14px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-gold:hover { background: var(--gold-hover); }
.btn-gold:active { transform: scale(0.99); }

/* Floating Connection Panel (No Drag, Auto-Fade) */
#floating-panel {
  position: absolute;
  width: 256px;
  z-index: 20;
  box-shadow: 0 0 0 1px rgba(240, 192, 0, 0.05), 0 24px 64px rgba(0, 0, 0, 0.8);
  top: 100px;
  left: 48px;
  transition: opacity 0.4s ease, visibility 0.4s ease;
  opacity: 1;
  visibility: visible;
}

/* When this class is added, the panel fades out */
#floating-panel.hidden {
  opacity: 0;
  visibility: hidden;
}

.drag-handle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(240, 192, 0, 0.1);
  background: #0a0a0a;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }
/* --- TEAM DASHBOARD FIGMA STYLES --- */
.tp-card { flex: 1; border: 1px solid rgba(240,192,0,0.12); background: #0e0e0e; padding: 16px 20px; }
.tp-label { font-size: 9px; color: #555566; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 8px; }
.tp-val { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; color: #f5f0e8; }
.tp-table-wrap { border: 1px solid rgba(240,192,0,0.12); background: #0e0e0e; margin-bottom: 24px; }
.tp-table-head { display: flex; align-items: center; gap: 8px; padding: 12px 20px; }
.tp-table { width: 100%; border-collapse: collapse; }
.tp-table th { padding: 10px 20px; font-size: 9px; color: #555566; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 600; text-align: right; border-bottom: 1px solid rgba(240,192,0,0.06); }
.tp-table th:first-child { text-align: left; }
.tp-table td { padding: 14px 20px; text-align: right; border-bottom: 1px solid rgba(240,192,0,0.04); }
.tp-table td:first-child { text-align: left; }
.tp-tab { padding: 12px 24px; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 600; cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; color: #555566; transition: all 0.2s; font-family: inherit; margin-bottom: -1px; }
.tp-tab:hover { color: #888888; }
.tp-tab.active { color: #f0c000; border-bottom-color: #f0c000; }
.tp-btn { flex: 1; font-size: 10px; font-weight: 900; letter-spacing: 0.25em; text-transform: uppercase; padding: 10px; cursor: pointer; transition: transform 0.1s; border: none; font-family: inherit; }
.tp-btn:active { transform: scale(0.98); }
.tp-btn-buy { background: #f0c000; color: black; }
.tp-btn-buy:hover { background: #ffd700; }
.tp-btn-sell { border: 1px solid #1a3a8f; background: rgba(26,58,143,0.1); color: #7aaaff; }
.tp-btn-sell:hover { background: rgba(204,34,51,0.2); border-color: rgba(204,34,51,0.6); color: #cc2233; }
/* --- HEADER & TICKER FIGMA STYLES --- */
.tp-header-btn { display: flex; align-items: center; gap: 8px; border: 1px solid rgba(240,192,0,0.15); background: transparent; padding: 6px 16px; color: #555566; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-family: inherit; font-weight: 600; }
.tp-header-btn:hover { border-color: rgba(204,34,51,0.5); color: #cc2233; }
.tp-live-badge { border: 1px solid rgba(76, 175, 125, 0.3); color: #4caf7d; cursor: default; }

.tp-ticker-wrap { width: 100%; overflow: hidden; background: rgba(8,8,8,0.8); border-bottom: 1px solid rgba(240,192,0,0.1); padding: 8px 0; display: flex; }
.tp-ticker-track { display: flex; width: max-content; animation: ticker-scroll 120s linear infinite; }
@keyframes ticker-scroll { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
.tp-ticker-item { display: flex; align-items: center; gap: 8px; padding: 0 32px; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
/* --- AGGRESSIVE MARKET STATE ANIMATIONS --- */
.market-banner-container {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  pointer-events: none; z-index: 99999;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.market-banner {
  width: 150vw; height: 160px;
  transform: translateX(-150%) skewX(-45deg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 100px rgba(0,0,0,0.8);
  border-top: 6px solid rgba(255,255,255,0.8);
  border-bottom: 6px solid rgba(255,255,255,0.8);
}
.market-banner.animate-in {
  animation: banner-slide 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes banner-slide {
  0% { transform: translateX(-150%) skewX(-45deg); }
  15% { transform: translateX(0) skewX(-45deg); }
  85% { transform: translateX(0) skewX(-45deg); }
  100% { transform: translateX(150%) skewX(-45deg); }
}
.market-content {
  transform: skewX(45deg); /* Un-skew the text so it is readable */
  display: flex; align-items: center; gap: 32px;
}
.market-text {
  font-size: 84px; font-weight: 900; color: black; letter-spacing: 0.1em;
  text-transform: uppercase; line-height: 1;
}

/* Lock Physics */
@keyframes lock-open {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}
@keyframes lock-close {
  0% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}
.shackle-open { animation: lock-open 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; animation-delay: 0.8s; }
.shackle-close { animation: lock-close 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; animation-delay: 0.8s; }

/* --- ADMIN PANEL FIGMA ANIMATIONS --- */
@keyframes ring-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.ring-rotate { animation: ring-rotate 8s linear infinite; transform-origin: center; }
.ring-rotate-rev { animation: ring-rotate 12s linear infinite reverse; transform-origin: center; }

@keyframes pulse-ring { 0% { transform: scale(0.88); opacity: 0.7; } 100% { transform: scale(1.5); opacity: 0; } }
.pulse-ring { animation: pulse-ring 2s ease-out infinite; transform-origin: center; }

@keyframes red-breathe {
  0%, 100% { box-shadow: 0 0 12px 2px rgba(204,34,51,0.15), inset 0 0 30px rgba(204,34,51,0.05); }
  50% { box-shadow: 0 0 32px 8px rgba(204,34,51,0.35), inset 0 0 60px rgba(204,34,51,0.1); }
}
.red-breathe { animation: red-breathe 2.4s ease-in-out infinite; }

@keyframes gold-glow {
  0%, 100% { box-shadow: 0 0 16px 3px rgba(240,192,0,0.12), inset 0 0 40px rgba(240,192,0,0.04); }
  50% { box-shadow: 0 0 36px 8px rgba(240,192,0,0.25), inset 0 0 60px rgba(240,192,0,0.08); }
}
.gold-glow { animation: gold-glow 3s ease-in-out infinite; }

@keyframes radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.radar-sweep { animation: radar 3s linear infinite; transform-origin: center; }

.market-btn { cursor: pointer; transition: transform 0.15s ease; border: none; outline: none; }
.market-btn:active { transform: scale(0.96) !important; }

/* Custom Admin Scrollbar */
.admin-scroll::-webkit-scrollbar { width: 4px; }
.admin-scroll::-webkit-scrollbar-track { background: transparent; }
.admin-scroll::-webkit-scrollbar-thumb { background: rgba(240,192,0,0.2); border-radius: 4px; }/* --- ADMIN PANEL FIGMA ANIMATIONS --- */

}

/* Custom Admin Scrollbar */
.admin-scroll::-webkit-scrollbar { width: 4px; }
.admin-scroll::-webkit-scrollbar-track { background: transparent; }
.admin-scroll::-webkit-scrollbar-thumb { background: rgba(240,192,0,0.2); border-radius: 4px; }

/* --- ADMIN BUTTON HOVER STATES --- */
.admin-btn-blue { background: rgba(26,58,143,0.1); border: 1px solid #1a3a8f; color: #7aaaff; font-size: 10px; font-weight: bold; letter-spacing: 0.15em; text-transform: uppercase; padding: 12px; cursor: pointer; transition: all 0.15s; }
.admin-btn-blue:hover { background: rgba(26,58,143,0.3); }

.admin-btn-red { background: transparent; border: 1px solid rgba(240,192,0,0.1); color: #444455; font-size: 10px; font-weight: bold; letter-spacing: 0.15em; text-transform: uppercase; padding: 12px; cursor: pointer; transition: all 0.2s; }
.admin-btn-red:hover { border-color: rgba(204,34,51,0.4); color: #cc2233; }

.admin-btn-gold { background: #f0c000; color: black; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; padding: 10px 20px; border: none; cursor: pointer; transition: all 0.15s; }
.admin-btn-gold:hover { background: #ffd700; }

.admin-btn-apply { font-size: 10px; font-weight: bold; letter-spacing: 0.2em; color: #f0c000; background: transparent; border: 1px solid rgba(240,192,0,0.3); padding: 6px 10px; cursor: pointer; transition: all 0.15s; }
.admin-btn-apply:hover { background: #f0c000; color: black; border-color: #f0c000; }

.admin-btn-remove { font-size: 10px; font-weight: bold; letter-spacing: 0.2em; color: #cc2233; background: transparent; border: 1px solid rgba(204,34,51,0.3); padding: 6px 10px; cursor: pointer; transition: all 0.15s; }
.admin-btn-remove:hover { background: #cc2233; color: white; border-color: #cc2233; }

.admin-btn-addcash { background: transparent; border: 1px solid rgba(76,175,125,0.5); color: #4caf7d; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; padding: 10px; cursor: pointer; transition: all 0.15s; }
.admin-btn-addcash:hover { background: #4caf7d; color: black; border-color: #4caf7d; }

.admin-btn-subcash { background: transparent; border: 1px solid rgba(204,34,51,0.5); color: #cc2233; font-size: 10px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; padding: 10px; cursor: pointer; transition: all 0.15s; }
.admin-btn-subcash:hover { background: #cc2233; color: white; border-color: #cc2233; }

.market-btn:hover { transform: scale(1.03); }

/* --- EYE ICON STATES --- */
.tx-eye-btn { color: #555566 !important; transition: color 0.1s ease; }
.tx-eye-btn:hover { color: #aaaaaa !important; }
.tx-eye-btn.is-visible { color: #f0c000 !important; }
.tx-eye-btn.is-visible:hover { color: #ffd700 !important; }

/* --- EASTER EGG MODAL --- */
.ee-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(8,8,8,0.85); backdrop-filter: blur(8px); z-index: 999999; display: flex; align-items: center; justify-content: center; animation: ee-fade-in 0.3s ease-out forwards; }
.ee-modal { width: 440px; background: #080808; border: 1px solid rgba(240,192,0,0.3); box-shadow: 0 0 60px rgba(240,192,0,0.1); padding: 2px; position: relative; overflow: hidden; transform: scale(0.95); animation: ee-pop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.ee-inner { background: #0e0e0e; padding: 40px; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid rgba(240,192,0,0.1); }
.ee-title { font-size: 14px; font-weight: 900; letter-spacing: 0.4em; color: #f0c000; text-transform: uppercase; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; width: 100%; justify-content: center; }
.ee-line { width: 40px; height: 1px; background: rgba(240,192,0,0.5); }
.ee-name { font-size: 20px; font-weight: 900; color: #f5f0e8; letter-spacing: 0.05em; margin-bottom: 6px; }
.ee-role { font-size: 10px; color: #8899bb; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 24px; line-height: 1.6; }
.ee-subtext { color: #555566; font-size: 9px; }
.ee-btn { margin-top: 16px; width: 100%; background: transparent; border: 1px solid #f0c000; color: #f0c000; font-size: 11px; font-weight: 900; letter-spacing: 0.3em; text-transform: uppercase; padding: 14px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.ee-btn:hover { background: #f0c000; color: black; box-shadow: 0 0 20px rgba(240,192,0,0.4); }
@keyframes ee-fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes ee-pop { to { transform: scale(1); } }
</style>
</head>
<body>
<div id="app-container" style="display: flex; height: 100vh; width: 100vw; overflow: hidden;">
    
    <!-- LEFT SIDEBAR (Hidden by default, shown when logged in) -->
    <aside id="sidebar" style="display: none; width: 260px; background: var(--panel); border-right: 1px solid rgba(255,255,255,0.03); padding: 24px; flex-direction: column;">
      <div style="font-weight: 700; font-size: 20px; color: var(--text-main); margin-bottom: 40px; letter-spacing: -0.5px;">
        ISL <span style="color: var(--blue-primary);">EXCHANGE</span>
      </div>
      
      <!-- Navigation Links -->
      <nav id="nav-links" style="display: flex; flex-direction: column; gap: 10px;">
        <!-- JS will inject sidebar buttons here depending on if Admin or Team -->
      </nav>
      
      <button class="btn-royal" onclick="logout()" style="margin-top: auto; width: 100%; background: transparent; border: 1px solid var(--loss); color: var(--loss); box-shadow: none;">Log Out</button>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main style="flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-dark); position: relative;">
      
      <!-- SCREEN 0: TRADE-X LOGIN -->
      <div id="screen-login" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; position: relative;">
        
        <div class="grid-bg"></div>

        <!-- Top Header -->
        <header style="position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 16px 32px; z-index: 10;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 24px; height: 24px; background: var(--gold); display: flex; align-items: center; justify-content: center; color: black; font-size: 10px; font-weight: 900;">MSX</div>
            <span style="font-size: 11px; color: var(--text-muted); letter-spacing: 0.3em; text-transform: uppercase;">Markhor Stock Exchange Terminal</span>
          </div>
          <div data-action="easter-egg" style="font-size: 10px; color: #555566; letter-spacing: 0.3em; cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='#f0c000'" onmouseout="this.style.color='#555566'">SYS 4.1.0</div>
        </header>

        <!-- Floating Connection Panel -->
        <div id="floating-panel" class="glass-panel">
          <div class="drag-handle" id="drag-handle">
            <span style="font-size: 10px; color: var(--gold); letter-spacing: 0.3em; text-transform: uppercase; font-weight: 600;">Data Source</span>
            <div style="display: flex; gap: 4px;">
              <span style="width: 6px; height: 6px; border-radius: 50%; background: #222233;"></span>
              <span style="width: 6px; height: 6px; border-radius: 50%; background: #222233;"></span>
              <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--gold);"></span>
            </div>
          </div>
          <div style="padding: 16px;">
            <label class="tx-label">Enter Address</label>
            <input id="ws-url" class="tx-input" type="text" placeholder="wss://localhost:8000/ws" style="margin-bottom: 12px;" />
            <button class="btn-gold" data-action="connect" style="background: transparent; border: 1px solid var(--blue-dark); color: #7aaaff; padding: 10px;">Connect Stream</button>
          </div>
        </div>

        <!-- Main Login Form -->
        <div style="width: 340px; z-index: 10;">
          <div style="margin-bottom: 40px;">
            <p style="font-size: 10px; color: var(--text-muted); letter-spacing: 0.4em; text-transform: uppercase; margin: 0 0 12px 0;">Secure Access</p>
            <h1 style="font-size: 38px; font-weight: 900; margin: 0; color: var(--text-main); letter-spacing: -1px;">SIGN IN</h1>
            <div style="display: flex; gap: 4px; margin-top: 16px;">
              <div style="height: 2px; width: 32px; background: var(--gold);"></div>
              <div style="height: 2px; width: 16px; background: var(--blue-dark);"></div>
              <div style="height: 2px; flex: 1; background: rgba(240, 192, 0, 0.1);"></div>
            </div>
          </div>

          <div style="margin-bottom: 20px;">
            <label class="tx-label">Username</label>
            <input id="login-username" class="tx-input" type="text" placeholder="trader@msx.io" />
          </div>

          <div style="margin-bottom: 24px; position: relative;">
            <label class="tx-label">Password</label>
            <input id="login-password" class="tx-input" type="password" placeholder="••••••••••••" style="padding-right: 40px;" />
            <button type="button" class="tx-eye-btn" data-action="toggle-password" data-target="login-password" style="position: absolute; right: 12px; top: 32px; background: none; border: none; color: #555566; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; z-index: 10;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>

          <button class="btn-gold" data-action="login">Access Terminal</button>
          <div id="login-flash" style="margin-top: 16px; font-size: 12px; font-weight: 700; color: var(--loss); text-align: center; min-height: 20px;"></div>
          
          <!-- Status Strip -->
          <div style="margin-top: 20px; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid rgba(240, 192, 0, 0.1); background: rgba(14, 14, 14, 0.8); backdrop-filter: blur(4px);">
            <div id="status-icon" style="flex-shrink: 0; display: flex; align-items: center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555566" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"></line><path d="M8.5 8.5a10 10 0 0 1 11 0"></path><path d="M12.5 12.5a5 5 0 0 1 3 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
            </div>
            <div>
              <div id="status-text" style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);">OFFLINE</div>
              <div id="status-subtext" style="font-size: 10px; color: #444455; margin-top: 2px;">No data source connected</div>
            </div>
          </div>
        </div>

      </div>

      <!-- SCREEN 1: TEAM DASHBOARD (Edge-to-Edge) -->
      <div id="screen-dashboard" style="display: none; width: 100%; height: 100%;"></div>

      <!-- SCREEN 2: ADMIN CONSOLE -->
      <div id="screen-admin" style="display: none; width: 100%; height: 100%;"></div>

    </main>
  </div>

<script>
(function () {
  "use strict";

  // Renamed storage key to flush old corrupted data automatically
  var STORAGE_KEY = "isl-exchange-state-v2";
  var STARTING_CASH = 100000;

  var DEFAULT_COMPANIES = [
    { id: "c1", name: "SolarTech", industry: "Renewable Energy", price: 100, prevPrice: 100 },
    { id: "c2", name: "MedLife", industry: "Healthcare", price: 75, prevPrice: 75 },
    { id: "c3", name: "SkyLink", industry: "Telecommunications", price: 90, prevPrice: 90 },
    { id: "c4", name: "FoodWave", industry: "Consumer Goods", price: 50, prevPrice: 50 },
    { id: "c5", name: "AutoNova", industry: "Electric Vehicles", price: 120, prevPrice: 120 },
    { id: "c6", name: "AquaPure", industry: "Water Solutions", price: 60, prevPrice: 60 },
    { id: "c7", name: "CyberGuard", industry: "Cybersecurity", price: 80, prevPrice: 80 },
    { id: "c8", name: "GlobalAir", industry: "Aviation", price: 95, prevPrice: 95 }
  ];

  function defaultState() {
    return { marketOpen: false, round: 1, companies: DEFAULT_COMPANIES, teams: [] };
  }

  function fmt(n) { return Number(n).toLocaleString("en-US", { maximumFractionDigits: 2 }); }
  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }

  // Controls the UI state of the pinned status strip
  function updateConnectionUI(state) {
    var iconDiv = document.getElementById("status-icon");
    var textDiv = document.getElementById("status-text");
    var subTextDiv = document.getElementById("status-subtext");
    var address = document.getElementById("ws-url").value || "server";
    
    if (!iconDiv || !textDiv || !subTextDiv) return;

    var icons = {
      offline: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555566" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"></line><path d="M8.5 8.5a10 10 0 0 1 11 0"></path><path d="M12.5 12.5a5 5 0 0 1 3 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>',
      connecting: '<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f0c000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="4.93" x2="19.07" y2="7.76"></line></svg>',
      connected: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4caf7d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>',
      error: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cc2233" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"></line><path d="M8.5 8.5a10 10 0 0 1 11 0"></path><path d="M12.5 12.5a5 5 0 0 1 3 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>'
    };

    if (state === "connecting") {
      iconDiv.innerHTML = icons.connecting;
      textDiv.innerText = "CONNECTING";
      textDiv.style.color = "var(--gold)";
      subTextDiv.innerText = "Reaching " + address + "...";
    } else if (state === "connected") {
      iconDiv.innerHTML = icons.connected;
      textDiv.innerText = "LIVE";
      textDiv.style.color = "var(--profit)";
      subTextDiv.innerText = "Stream active · " + address;
    } else if (state === "error") {
      iconDiv.innerHTML = icons.error;
      textDiv.innerText = "FAILED";
      textDiv.style.color = "var(--loss)";
      subTextDiv.innerText = "Cannot reach " + address;
    } else {
      iconDiv.innerHTML = icons.offline;
      textDiv.innerText = "OFFLINE";
      textDiv.style.color = "var(--text-muted)";
      subTextDiv.innerText = "No data source connected";
    }
  }

  function stockPortfolioValue(team, companies) {
    var holdings = team.holdings || {};
    var val = 0;
    for (var cid in holdings) {
      var c = companies.find(function (c) { return c.id === cid; });
      if (c) val += Number(c.price || 0) * Number(holdings[cid] || 0);
    }
    return val;
  }

  function totalEquity(team, companies) {
    var cash = Number(team.cash) || 0; // Forces cash to be a valid number
    return cash + stockPortfolioValue(team, companies);
  }

  // App state
  var gameState = null;
  var lastMarketState = null;
  var role = null; 
  var currentTeamUsername = null;
  var local = { adminTab: "overview", teamTab: "dashboard", selectedCompanyId: null, flash: null, tradeQty: "" };
  var root = document.getElementById("root");

  // --- MISSING CORE FUNCTIONS RESTORED ---
  function flash(text, ok) {
    local.flash = text; 
    local.flashOk = ok !== false; 
    render();
    setTimeout(function () { local.flash = null; render(); }, 1200);
  }

  function triggerMarketAnimation(isOpen) {
    // 1. Kill any rogue destruction timers from previous clicks
    if (window.marketAnimTimer) clearTimeout(window.marketAnimTimer);

    // 2. Destroy existing animation element if it is still on screen
    var existing = document.getElementById("market-anim-layer");
    if (existing) existing.remove();

    var container = document.createElement("div");
    container.id = "market-anim-layer";
    container.className = "market-banner-container";
    document.body.appendChild(container);

    var color = isOpen ? "#4caf7d" : "#cc2233";
    var text = isOpen ? "MARKET OPEN" : "MARKET CLOSED";
    var shackleClass = isOpen ? "shackle-open" : "shackle-close";

    var lockSVG = '<svg width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="overflow:visible;">' +
      '<path class="' + shackleClass + '" d="M7 11V7a5 5 0 0 1 10 0v4"></path>' +
      '<rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="' + color + '"></rect>' +
    '</svg>';

    container.innerHTML = '<div class="market-banner animate-in" style="background:' + color + ';">' +
      '<div class="market-content">' +
        lockSVG +
        '<span class="market-text">' + text + '</span>' +
      '</div>' +
    '</div>';

    // 3. Assign the new timer to the window object so we can track it
    window.marketAnimTimer = setTimeout(function() {
      var el = document.getElementById("market-anim-layer");
      if (el) el.remove();
    }, 4500); 
  }

  function sendAction(actionName, payload) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      var basePayload = { action: actionName, authPass: local.authPass }; // ALWAYS SEND PASSWORD
      if (role === "admin") basePayload.admin = true;
      if (role === "team") basePayload.username = currentTeamUsername;
      ws.send(JSON.stringify(Object.assign(basePayload, payload || {})));
    } else {
      flash("NOT CONNECTED TO SERVER.", false);
    }
  }
  // --- WEBSOCKET PIPELINE ---
  var ws = null;

  function connectStream() {
    var urlInput = document.getElementById("ws-url").value.trim();
    var finalUrl = "ws://localhost:8000/ws"; // Fallback

    if (urlInput) {
      // 1. Strip existing protocols if the user pasted them
      var tempUrl = urlInput.replace("http://", "").replace("https://", "").replace("ws://", "").replace("wss://", "");
      
      // 2. Smart Protocol Detection
      // If it's localhost or an IPv4 address, it's an unencrypted local server. Otherwise, it's a secure Cloudflare/Web domain.
      var isLocal = tempUrl.startsWith("localhost") || tempUrl.match(/^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/);
      tempUrl = (isLocal ? "ws://" : "wss://") + tempUrl;
      
      // 3. Smart Port Injection
      try {
        var parsed = new URL(tempUrl);
        
        // ONLY force port 8000 if it is a local test environment! 
        // Cloudflare URLs will now correctly default to port 443.
        if (isLocal && !parsed.port) {
          parsed.port = "8000"; 
        }
        
        if (parsed.pathname === "/" || parsed.pathname === "") {
            parsed.pathname = "/ws";
        }
        finalUrl = parsed.href;
      } catch (e) {
        console.error("Invalid URL format:", tempUrl);
        updateConnectionUI("error");
        return;
      }
    }

    updateConnectionUI("connecting");
    
    // --- DEFENSIVE CONNECTION LOCK ---
    if (ws) {
      if (ws.readyState === WebSocket.CONNECTING) {
        console.warn("Connection attempt already in progress. Ignoring click.");
        return; 
      }
      ws.close();
    }

    try {
      ws = new WebSocket(finalUrl);
    } catch (err) {
      console.error("WebSocket creation failed:", err);
      updateConnectionUI("error");
      return;
    }

    ws.onopen = function () {
      updateConnectionUI("connected");
      var floatingPanel = document.getElementById("floating-panel");
      if (floatingPanel) floatingPanel.classList.add("hidden");
      
      ws.send(JSON.stringify({ action: "get_state" })); 
    };

    ws.onerror = function (err) {
      console.error("WebSocket connection failed:", err);
      updateConnectionUI("error");
    };

    ws.onclose = function () {
      updateConnectionUI("error");
      var floatingPanel = document.getElementById("floating-panel");
      if (floatingPanel) floatingPanel.classList.remove("hidden");
      
      if (role) {
        doLogout();
        var loginFlash = document.getElementById("login-flash");
        if (loginFlash) {
          loginFlash.innerText = "CONNECTION LOST. PLEASE RECONNECT.";
          loginFlash.style.color = "var(--loss)";
        }
      }
    };

    ws.onmessage = function (event) {
      var msg = JSON.parse(event.data);
      
      if (msg.type === "log") {
        if (typeof addAdminLog === "function" && role === "admin") {
            addAdminLog(msg.text, msg.logType);
        }
        return;
      }

      if (msg.type === "state") {
        gameState = msg.state;
      }
      else if (msg.teams !== undefined || msg.companies !== undefined) {
        gameState = msg;
      }
      else if (msg.type === "error" || msg.error !== undefined || msg.message !== undefined) {
        var errorText = (msg.message || msg.error || "UNKNOWN SERVER REJECTION").toUpperCase();
        
        if (role === "team" || role === "admin") {
            flash(errorText, false); 
        } else {
            var loginFlash = document.getElementById("login-flash");
            if (loginFlash) {
              loginFlash.innerText = errorText;
              loginFlash.style.color = "var(--loss)";
            }
        }
        return; 
      }

      if (gameState) {
        if (lastMarketState !== null && lastMarketState !== gameState.marketOpen) {
            if (role === "team") {
                triggerMarketAnimation(gameState.marketOpen);
            }
        }
        lastMarketState = gameState.marketOpen;

        var flashEl = document.getElementById("login-flash");
        if (flashEl && flashEl.innerText.includes("WAITING")) {
            flashEl.innerText = "";
        }
        render(); 
      }
    };
  }

  // --- AUTHENTICATION LOGIC ---
  function submitLogin() {
    var flash = document.getElementById("login-flash");
    var u = (document.getElementById("login-username").value || "").trim().toLowerCase();
    var p = document.getElementById("login-password").value;

    // Block login if the server hasn't sent the game state yet
    if (!ws || ws.readyState !== WebSocket.OPEN || !gameState) {
      if (flash) {
        flash.innerText = "SYSTEM ERROR: WAITING FOR DATA STREAM.";
        flash.style.color = "var(--loss)";
      }
      return;
    }

    if (!u || !p) {
      if (flash) {
        flash.innerText = "AUTHENTICATION ERROR: CREDENTIALS REQUIRED.";
        flash.style.color = "var(--loss)";
      }
      return;
    }

    // 1. Strict Admin Lock
    if (u === "admin") {
      if (p === gameState.adminPassword) {
        role = "admin";
        currentTeamUsername = null;
        if (flash) flash.innerText = "";
        render(); // Move to admin dashboard
        return;
      } else {
        if (flash) {
          flash.innerText = "INCORRECT ADMIN PASSWORD.";
          flash.style.color = "var(--loss)";
        }
        return;
      }
    }

    // 2. Team Login Verification
    var team = gameState.teams.find(function (t) {
      return t.username.toLowerCase() === u && t.password === p;
    });

    if (team) {
      role = "team";
      currentTeamUsername = team.username;
      if (flash) flash.innerText = "";
      render(); // Move to team dashboard
    } else {
      if (flash) {
        flash.innerText = "INCORRECT TEAM CREDENTIALS.";
        flash.style.color = "var(--loss)";
      }
    }
  }
  
  function tickerHTML(companies) {
    if (!companies || companies.length === 0) return "";
    var items = companies.concat(companies);
    var html = items.map(function (c) {
      var change = c.price - c.prevPrice;
      var pct = c.prevPrice ? (change / c.prevPrice) * 100 : 0;
      var cls = change > 0 ? "up" : change < 0 ? "down" : "flat";
      var arrow = change > 0 ? "&#9650;" : change < 0 ? "&#9660;" : "&#8211;";
      
      return '<div class="ticker-item" data-company-id="' + esc(c.id) + '">' +
               '<span>' + esc(c.name) + '</span>' +
               '<span class="mono ticker-price ' + cls + '" style="font-weight:600;">$' + fmt(c.price) + '</span>' +
               '<span class="mono ticker-pct ' + cls + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</span>' +
             '</div>';
    }).join("");
    return '<div class="ticker-wrap"><div class="ticker-track">' + html + '</div></div>';
  }

  function statCard(label, value) { return '<div class="card"><div class="card-label">' + esc(label) + '</div><div class="card-value mono">' + value + '</div></div>'; }

  function leaderboardHTML(highlightUsername) {
    var rows = gameState.teams.map(function (t) { 
      return Object.assign({}, t, { equity: totalEquity(t, gameState.companies) }); 
    }).sort(function (a, b) { 
      return b.equity - a.equity; 
    });
    
    var body = rows.length === 0 ? '<div style="padding:24px;text-align:center;color:var(--muted);font-size:14px;">No teams yet.</div>' :
      '<table><thead><tr><th>#</th><th>Team</th><th class="text-right">Total Equity</th><th class="text-right">Gain/Loss</th></tr></thead><tbody>' +
      rows.map(function (t, i) {
        var gain = t.equity - STARTING_CASH;
        var pct = (gain / STARTING_CASH) * 100;
        var isMe = t.username === highlightUsername;
        
        // Handle exact zero, positive, and negative states properly
        var colorCls = gain > 0 ? "up" : gain < 0 ? "down" : "flat";
        var sign = gain > 0 ? "+" : gain < 0 ? "-" : "";

        return '<tr' + (isMe ? ' style="background:rgba(251,191,36,0.05);"' : '') + '>' +
          '<td class="mono" style="color:var(--muted);">' + (i + 1) + '</td>' +
          '<td>' + esc(t.teamName) + (isMe ? ' <span style="color:var(--gold);font-size:12px;">(you)</span>' : '') + '</td>' +
          '<td class="text-right mono">$' + fmt(t.equity) + '</td>' +
          '<td class="text-right mono ' + colorCls + '">' + sign + '$' + fmt(Math.abs(gain)) + ' (' + sign + Math.abs(pct).toFixed(2) + '%)</td>' +
        '</tr>';
      }).join("") + '</tbody></table>';
      
    return '<div class="table-wrap"><div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;">&#127942; Leaderboard</div>' + body + '</div>';
  }

  function marketWatchHTML(team) {
    var s = gameState;
    var rows = s.companies.map(function(c) {
      var change = c.price - c.prevPrice;
      var pct = c.prevPrice ? (change / c.prevPrice) * 100 : 0;
      var cls = change > 0 ? "up" : change < 0 ? "down" : "flat";
      var arrow = change > 0 ? "&#9650;" : change < 0 ? "&#9660;" : "&#8211;";
      var owned = (team.holdings && team.holdings[c.id]) || 0;
      
      return '<tr>' +
        '<td style="font-weight:600;">' + esc(c.name) + '<br><span style="font-size:12px;color:var(--muted);font-weight:normal;">' + esc(c.industry) + '</span></td>' +
        '<td class="text-right mono ' + cls + '">$' + fmt(c.price) + '</td>' +
        '<td class="text-right mono ' + cls + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</td>' +
        '<td class="text-right mono">' + (owned > 0 ? owned : '-') + '</td>' +
      '</tr>';
    }).join("");

    return '<div class="table-wrap" style="margin-bottom: 16px;">' +
      '<div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;">&#128200; Market Watch</div>' +
      '<table><thead><tr><th>Company</th><th class="text-right">Price</th><th class="text-right">Change</th><th class="text-right">Owned</th></tr></thead><tbody>' +
      rows + '</tbody></table></div>';
  }

  function render() {
    var loginScreen = document.getElementById("screen-login");
    var dashboardScreen = document.getElementById("screen-dashboard");
    var adminScreen = document.getElementById("screen-admin");

    if (role === "admin") {
      if (loginScreen) loginScreen.style.display = "none";
      if (dashboardScreen) dashboardScreen.style.display = "none";
      if (adminScreen) {
        adminScreen.style.display = "block";
        buildAdminUI(adminScreen); // <-- Now uses the smart builder
      }
    } else if (role === "team") {
      if (loginScreen) loginScreen.style.display = "none";
      if (adminScreen) adminScreen.style.display = "none";
      if (dashboardScreen) {
        dashboardScreen.style.display = "block";
        var team = gameState.teams.find(function(t) { return t.username === currentTeamUsername; });
        buildTeamUI(team, dashboardScreen);
      }
    } else {
      if (loginScreen) loginScreen.style.display = "flex";
      if (dashboardScreen) dashboardScreen.style.display = "none";
      if (adminScreen) adminScreen.style.display = "none";
    }
  }

  function buildAdminUI(container) {
    var s = gameState;
    var tab = local.adminTab || "overview";

    if (!local.activityLog) {
      local.activityLog = [{ id: 1, text: "Admin console initialized.", type: "reset", time: new Date().toLocaleTimeString("en-US", { hour12: false }) }];
    }

    if (!document.getElementById("admin-shell")) {
      container.innerHTML = '<div id="admin-shell" style="position:relative; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden;">' +
        '<div id="admin-bg" style="position:absolute; inset:0; pointer-events:none; z-index:0; opacity:0.3;">' +
          '<svg style="width:100%; height:100%;" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1440 900">' +
            '<g opacity="0.1">' +
              Array.from({length:23}).map(function(_,i){ return '<line x1="'+(i*64)+'" y1="0" x2="'+(i*64)+'" y2="900" stroke="#f0c000" stroke-width="0.5"/>'; }).join('') +
              Array.from({length:15}).map(function(_,i){ return '<line x1="0" y1="'+(i*64)+'" x2="1440" y2="'+(i*64)+'" stroke="#f0c000" stroke-width="0.5"/>'; }).join('') +
            '</g>' +
            '<path d="M0,200 L1440,200" stroke="#1a3a8f" stroke-width="1.5" opacity="0.1" stroke-dasharray="4 4"/>' +
          '</svg>' +
        '</div>' +
        '<div id="admin-header" style="position:relative; z-index:10; display:flex; justify-content:space-between; align-items:center; padding:16px 32px; border-bottom:1px solid rgba(240,192,0,0.1); flex-shrink:0;"></div>' +
        '<div id="admin-ticker" class="tp-ticker-wrap" style="position:relative; z-index:10; flex-shrink:0;"></div>' +
        '<div id="admin-tabs" style="position:relative; z-index:10; display:flex; gap:0; padding:0 32px; border-bottom:1px solid rgba(240,192,0,0.1); flex-shrink:0;"></div>' +
        '<div id="admin-body" style="position:relative; z-index:10; flex:1; padding:24px 32px; display:flex; flex-direction:column; min-height:0; overflow-y:auto;"></div>' +
      '</div>';
    }

    var tabs = [
      ["overview","Overview"],
      ["companies","Companies"],
      ["teams","Teams"],
      ["leaderboard","Leaderboard"],
      ["settings","Settings"]
    ];

    document.getElementById("admin-header").innerHTML =
      '<div style="display:flex; align-items:center; gap:12px;">' +
        '<div style="width:24px; height:24px; background:var(--gold); display:flex; align-items:center; justify-content:center; color:black; font-size:10px; font-weight:900;">MSX</div>' +
        '<span style="font-size:11px; color:#555566; letter-spacing:0.3em; text-transform:uppercase;">Markhor Stock Exchange Terminal</span>' +
      '</div>' +
      '<div style="display:flex; flex-direction:column; align-items:center; gap:4px; position:absolute; left:50%; transform:translateX(-50%);">' +
        '<span style="font-size:18px; font-weight:900; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase;">Admin Console</span>' +
        '<div style="display:flex; align-items:center; gap:6px;">' +
          '<span style="width:6px; height:6px; border-radius:50%; background:' + (s.marketOpen ? '#4caf7d' : '#cc2233') + ';"></span>' +
          '<span style="font-size:9px; color:' + (s.marketOpen ? '#4caf7d' : '#cc2233') + '; letter-spacing:0.3em; text-transform:uppercase; font-weight:600;">Market ' + (s.marketOpen ? 'Open' : 'Closed') + ' &middot; Round ' + s.round + '</span>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex; align-items:center; gap:12px;">' +
        '<div data-action="easter-egg" style="display:flex; align-items:center; gap:8px; border:1px solid rgba(76,175,125,0.3); padding:6px 16px; color:#4caf7d; font-size:10px; letter-spacing:0.25em; text-transform:uppercase; font-weight:600; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.background=\'rgba(76,175,125,0.1)\'" onmouseout="this.style.background=\'transparent\'"><span style="width:6px; height:6px; border-radius:50%; background:#4caf7d;"></span> LIVE</div>' +
        '<button data-action="logout" class="tp-header-btn">LOG OUT</button>' +
      '</div>';

    document.getElementById("admin-tabs").innerHTML = tabs.map(function(t) { 
      var isActive = tab === t[0];
      return '<button data-action="set-admin-tab" data-tab="' + t[0] + '" style="padding:12px 20px; font-size:10px; letter-spacing:0.3em; text-transform:uppercase; font-weight:600; cursor:pointer; background:none; border:none; border-bottom:2px solid ' + (isActive ? '#f0c000' : 'transparent') + '; color:' + (isActive ? '#f0c000' : '#555566') + '; transition:all 0.2s; margin-bottom:-1px; font-family:inherit;">' + t[1] + '</button>'; 
    }).join("");

    // Update Admin Ticker (Seamless DOM Update)

  function addAdminLog(text, type) {
    if (!local.activityLog) local.activityLog = [];
    local.activityLog.unshift({
      id: Date.now(),
      text: text,
      type: type, 
      time: new Date().toLocaleTimeString("en-US", { hour12: false })
    });
    if (local.activityLog.length > 50) local.activityLog.pop(); // Keeps the last 50 events
    render();
  }

  // --- COMPLETE UI EVENT ROUTER ---
  document.addEventListener("click", function (e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    
    var action = btn.getAttribute("data-action");
    
    // Global Actions
    if (action === "connect") { e.preventDefault(); connectStream(); } 
    else if (action === "login") { e.preventDefault(); submitLogin(); } 
    else if (action === "logout") { e.preventDefault(); doLogout(); }
    else if (action === "easter-egg") { e.preventDefault(); showEasterEgg(); } // NEW TRIGGER
    else if (action === "toggle-password") {
      e.preventDefault();
      var targetId = btn.getAttribute("data-target");
      var input = document.getElementById(targetId);
      
      var eyeSVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      var eyeOffSVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" x2="22" y1="2" y2="22"></line></svg>';

      if (input) {
        if (input.type === "password") { 
          input.type = "text"; 
          btn.classList.add("is-visible");
          btn.innerHTML = eyeOffSVG; 
        } else { 
          input.type = "password"; 
          btn.classList.remove("is-visible");
          btn.innerHTML = eyeSVG;
        }
      }
    }
    
    // Team Actions
    else if (action === "set-team-tab") { e.preventDefault(); local.teamTab = btn.getAttribute("data-tab"); render(); } 
    else if (action === "select-company-row") { e.preventDefault(); local.selectedCompanyId = btn.getAttribute("data-id"); render(); } 
    else if (action === "buy") { e.preventDefault(); buyShares(); } 
    else if (action === "sell") { e.preventDefault(); sellShares(); }
    
    // Admin Actions
    else if (action === "set-admin-tab") { e.preventDefault(); local.adminTab = btn.getAttribute("data-tab"); render(); }
    else if (action === "toggle-market") { e.preventDefault(); toggleMarket(); }
    else if (action === "next-round") { e.preventDefault(); nextRound(); }
    else if (action === "reset-game") { e.preventDefault(); resetGame(); }
    else if (action === "apply-price") { e.preventDefault(); applyPrice(btn.getAttribute("data-id")); }
    else if (action === "delete-company") { e.preventDefault(); deleteCompany(btn.getAttribute("data-id")); }
    else if (action === "add-company") { e.preventDefault(); addCompany(); }
    else if (action === "delete-team") { e.preventDefault(); deleteTeam(btn.getAttribute("data-id")); }
    else if (action === "add-team") { e.preventDefault(); addTeam(); }
    else if (action === "change-admin-password") { e.preventDefault(); changeAdminPassword(); }
    else if (action === "add-cash") { e.preventDefault(); adjustCash(true); }
    else if (action === "remove-cash") { e.preventDefault(); adjustCash(false); }
  });

  // Actions
 function doLogin() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      local.flash = "You must connect to the server first.";
      render();
      return;
    }

    var username = (document.getElementById("login-username") || {}).value || "";
    var password = (document.getElementById("login-password") || {}).value || "";
    local.flash = null;
    var userLower = username.trim().toLowerCase();

    // 1. Strict Admin Lock
    if (userLower === "admin") {
      if (password === gameState.adminPassword) {
        role = "admin";
        currentTeamUsername = null;
        local.authPass = password; // NEW: Save secret in memory
        render(); 
      } else {
        local.flash = "Incorrect admin password.";
        render();
      }
      return;
    }

    // 2. Team Login
    var team = gameState.teams.find(function (t) {
      return t.username.toLowerCase() === userLower && t.password === password;
    });

    if (team) {
      role = "team";
      currentTeamUsername = team.username;
      local.authPass = password; // NEW: Save secret in memory
      render(); 
    } else {
      local.flash = "Incorrect team username or password.";
      render();
    }
  }

  function doLogout() {
    // 1. Extract the Live Activity log so it survives the purge
    var savedLogs = local.activityLog || [];

    // 2. Nuke the entire local state dictionary. 
    // This instantly resets the admin tab to "overview", the team tab to "dashboard", 
    // clears the selected dropdowns, and wipes any stored text memory.
    local = {};

    // 3. Inject the surviving logs back into the freshly wiped state
    local.activityLog = savedLogs;

    // 4. Revoke access and wipe the role
    role = null;
    
    // 5. Clear any lingering error messages on the login screen
    var flashEl = document.getElementById("login-flash");
    if (flashEl) flashEl.innerText = "";

    // 6. Rebuild the screen
    render();
  }

  function toggleMarket() { 
    sendAction("toggle-market"); 
    addAdminLog(gameState.marketOpen ? "Market closed by admin" : "Market opened by admin", "market");
  }
  
  function applyPrice(id) {
    var input = document.getElementById("price-edit-" + id);
    var val = input ? input.value : "";
    
    // If the box is empty, stop completely. Do not send data, do not log.
    if (val === "" || val === undefined) return;
    
    var modifier = Number(val);
    sendAction("apply-price", { id: id, modifier: modifier });
    
    // Look up the company name and log the result
    var company = gameState.companies.find(function(c) { return c.id === id; });
    if (company) {
      var dir = modifier >= 0 ? "increased" : "decreased";
      addAdminLog(company.name + " price " + dir + " by $" + Math.abs(modifier), modifier >= 0 ? "trade-up" : "trade-down");
    }
    
    if (input) input.value = ""; 
  }

  // --- ANTI-SPAM LOCK ---
  var isTrading = false; 

  function buyShares() {
    if (isTrading) return; // Block phantom double-clicks
    
    var selectedId = local.selectedCompanyId || (gameState.companies[0] && gameState.companies[0].id);
    var qtyInput = document.getElementById("trade-qty");
    var q = qtyInput ? Number(qtyInput.value) : Number(local.tradeQty || 0);
    
    if (!q || q <= 0) return flash("INVALID QUANTITY.", false);

    var company = gameState.companies.find(function(c) { return c.id === selectedId; });
    if (!company) return flash("PLEASE SELECT A STOCK.", false);
    
    // Lock the trigger
    isTrading = true;
    
    // 1. Trigger the flash and send the data
    flash("BOUGHT " + q + " SHARES OF " + company.name.toUpperCase(), true);
    
    // 2. Wipe memory and UI FIRST
    local.tradeQty = ""; 
    if (qtyInput) qtyInput.value = ""; 
     
    sendAction("buy", { companyId: selectedId, quantity: q });

    // Unlock after 180ms
    setTimeout(function() { isTrading = false; }, 180); 
  }

  function sellShares() {
    if (isTrading) return; // Block phantom double-clicks

    var selectedId = local.selectedCompanyId || (gameState.companies[0] && gameState.companies[0].id);
    var qtyInput = document.getElementById("trade-qty");
    var q = qtyInput ? Number(qtyInput.value) : Number(local.tradeQty || 0);
    
    if (!q || q <= 0) return flash("INVALID QUANTITY.", false);

    var company = gameState.companies.find(function(c) { return c.id === selectedId; });
    if (!company) return flash("PLEASE SELECT A STOCK.", false);
    
    // Lock the trigger
    isTrading = true;
    
    // 1. Trigger the flash (false = red) and send the data
    flash("SOLD " + q + " SHARES OF " + company.name.toUpperCase(), false);

    // 2. Wipe memory and UI FIRST
    local.tradeQty = ""; 
    if (qtyInput) qtyInput.value = ""; 
    
    sendAction("sell", { companyId: selectedId, quantity: q });

    // Unlock after 180ms
    setTimeout(function() { isTrading = false; }, 180); 
  }
  function nextRound() { 
    sendAction("next-round"); 
    addAdminLog("Advanced to Round " + (gameState.round + 1), "round");
  }
  
  function resetGame() {
    if (!window.confirm("Reset all teams to $100,000 and clear all holdings?")) return;
    sendAction("reset-game");
    addAdminLog("Game reset by admin", "reset");
  }

  function addCompany() {
    var name = (document.getElementById("new-company-name") || {}).value || "";
    var industry = (document.getElementById("new-company-industry") || {}).value || "";
    var price = (document.getElementById("new-company-price") || {}).value || "";
    if (!name.trim() || !price) return;
    
    sendAction("add-company", { name: name.trim(), industry: industry.trim() || "General", price: Number(price) });
    
    // Clear inputs
    document.getElementById("new-company-name").value = "";
    document.getElementById("new-company-industry").value = "";
    document.getElementById("new-company-price").value = "";
  }

  function deleteCompany(id) {
    if (!window.confirm("Delete this company? This will also wipe any shares teams own of it.")) return;
    sendAction("delete-company", { id: id });
  }

  function addTeam() {
    var teamName = (document.getElementById("new-team-name") || {}).value || "";
    var username = (document.getElementById("new-team-username") || {}).value || "";
    var password = (document.getElementById("new-team-password") || {}).value || "";
    
    if (!username.trim() || !password || !teamName.trim()) return;
    
    // STRICT ADMIN LOCK
    if (username.trim().toLowerCase() === "admin") {
      window.alert("Reserved system name: You cannot name a team 'admin'.");
      return;
    }
    
    sendAction("add-team", { teamName: teamName.trim(), username: username.trim(), password: password });
    
    // Clear inputs
    document.getElementById("new-team-name").value = "";
    document.getElementById("new-team-username").value = "";
    document.getElementById("new-team-password").value = "";
  }

  function deleteTeam(username) {
    if (!window.confirm("Permanently remove this team and their holdings?")) return;
    sendAction("delete-team", { username: username });
  }

  function changeAdminPassword() {
    var curr = (document.getElementById("pw-current") || {}).value || "";
    var next = (document.getElementById("pw-new") || {}).value || "";
    var conf = (document.getElementById("pw-confirm") || {}).value || "";
    
    if (!curr || !next || !conf) return flash("Fill all password fields.", false);
    if (curr !== gameState.adminPassword) return flash("Current password is incorrect.", false);
    if (next !== conf) return flash("New passwords do not match.", false);
    if (next.length < 4) return flash("Password must be at least 4 characters.", false);
    
    sendAction("change-password", { next: next });
    local.authPass = next; // Update the local memory instantly
    flash("Admin password updated successfully.", true);
    
    // Clear inputs
    document.getElementById("pw-current").value = "";
    document.getElementById("pw-new").value = "";
    document.getElementById("pw-confirm").value = "";
  }

  function adjustCash(isAdding) {
    var teamUser = (document.getElementById("adjust-cash-team") || {}).value || "";
    var amt = Number((document.getElementById("adjust-cash-amount") || {}).value || 0);
    
    // If invalid input, flash error and stop.
    if (!teamUser || amt <= 0) return flash("Enter a valid positive amount.", false);
    
    var finalAmt = isAdding ? amt : -amt;
    sendAction("adjust-cash", { username: teamUser, amount: finalAmt });
    
    // Look up the team name and log the result
    var team = gameState.teams.find(function(t) { return t.username === teamUser; });
    if (team) {
      addAdminLog((isAdding ? "Added $" : "Deducted $") + fmt(amt) + (isAdding ? " to " : " from ") + team.teamName, isAdding ? "trade-up" : "trade-down");
    }
    
    var input = document.getElementById("adjust-cash-amount");
    if (input) input.value = "";
  }

  // Events
  document.addEventListener("submit", function (e) {
    var form = e.target.closest('[data-action="login-submit"]');
    if (form) { e.preventDefault(); doLogin(); }
  });

  document.addEventListener("input", function (e) {
    if (e.target && e.target.id === "trade-qty") {
      local.tradeQty = e.target.value;
    }
  });

  document.addEventListener("change", function (e) {
    if (e.target && e.target.id === "trade-select") { local.selectedCompanyId = e.target.value; render(); }
  });

  var secretInput = "";
  document.addEventListener("keydown", function (e) {
    // Ignore keystrokes if the user is typing inside an active text input box
    if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;

    secretInput += e.key.toLowerCase();
    
    // Keep only the last 10 characters to prevent memory accumulation
    if (secretInput.length > 10) {
      secretInput = secretInput.substring(secretInput.length - 10);
    }

    // Trigger check
    if (secretInput.includes("um") || secretInput.includes("ay")) {
      var modal = document.getElementById("easter-egg-modal");
      if (modal) modal.classList.add("active");
      secretInput = ""; // Clear buffer
    }
  });
  
  render();
})();
</script>
</body>
</html>
